[General]
network = src.STPRingNetwork
sim-time-limit = 200s
# Bật STP
*.sw*.hasStp = true
*.sw*.spanningTreeProtocol = "Stp"    # hoặc "Rstp"
*.sw*.llc.typename = "Ieee8022Llc"

# Bridge Priority (Ép sw1 làm Root Bridge)
*.sw1.stp.bridgePriority = 4096
*.sw2.stp.bridgePriority = 32768
*.sw3.stp.bridgePriority = 32768
*.sw4.stp.bridgePriority = 32768

# Timers
*.sw*.stp.helloTime    = 2s
*.sw*.stp.forwardDelay = 15s
*.sw*.stp.maxAge       = 20s

# Hiển thị màu cổng trong Qtenv
*.sw*.stp.visualize = true

# Cấu hình Ping từ host1 sang host2
*.host1.numApps = 1
*.host1.app[0].typename = "PingApp"
*.host1.app[0].destAddr = "host2"
# Đợi STP hội tụ xong mới ping (do delay là 30s)
*.host1.app[0].startTime = 35s

# Chỉ lưu các vector cần thiết để xuất thời gian phản hồi của từng gói ping.
# pingTxSeq giữ cả các gói không nhận được phản hồi, để CSV có thể đánh dấu LOST.
*.host1.app[0].rtt:vector.vector-recording = true
*.host1.app[0].pingTxSeq:vector.vector-recording = true
*.host1.app[0].pingRxSeq:vector.vector-recording = true
**.vector-recording = false

[Config KichBan1_DutCap]
description = "Đứt 1 đường cáp giữa SW1 và SW2"
*.scenarioManager.script = xmldoc("scenario.xml")

[Config Kich_Ban_Sap_Root]
description = "Kich ban 2: Sap nguon Switch sw4"
*.scenarioManager.script = xmldoc("scenario_sapproot.xml")
*.host1.app[0].startTime = 65s

# =============================================================================
# Ma trận thí nghiệm so sánh
# =============================================================================

[Config ExperimentBase]
abstract = true
sim-time-limit = 220s
repeat = 1
seed-set = ${repetition}

# Cho phép ScenarioManager shutdown/startup switch.
*.sw*.hasStatus = true

# Root của nhóm thí nghiệm là sw2. sw2 không gắn trực tiếp với host nên khi
# root sập, host1 và host2 vẫn còn đường vật lý thay thế để đo reconvergence.
*.sw1.stp.bridgePriority = 32768
*.sw2.stp.bridgePriority = 4096

[Config TopoHienTai]
abstract = true
network = src.STPRingNetwork

[Config TopoPhucTap]
abstract = true
network = src.STPComplexNetwork

[Config SuCoDutCap]
abstract = true
*.scenarioManager.script = xmldoc("scenario_dutcap_experiment.xml")

[Config SuCoSapRoot]
abstract = true
*.scenarioManager.script = xmldoc("scenario_saproot_experiment.xml")

# So sánh 1: ảnh hưởng của lambda khi đứt cáp, dùng topology hiện tại.
[Config SoSanh1_DutCap_Lambda1]
description = "Đứt cáp, topology hiện tại, profile lambda1"
extends = ExperimentBase, TopoHienTai, SuCoDutCap

[Config SoSanh1_DutCap_Lambda2]
description = "Đứt cáp, topology hiện tại, profile lambda2"
extends = ExperimentBase, TopoHienTai, SuCoDutCap

# So sánh 2: ảnh hưởng của lambda khi Root Bridge sập.
[Config SoSanh2_SapRoot_Lambda1]
description = "Sập root sw2, topology hiện tại, profile lambda1"
extends = ExperimentBase, TopoHienTai, SuCoSapRoot

[Config SoSanh2_SapRoot_Lambda2]
description = "Sập root sw2, topology hiện tại, profile lambda2"
extends = ExperimentBase, TopoHienTai, SuCoSapRoot

# So sánh 3: ảnh hưởng của độ phức tạp topology khi đứt cáp.
# Cả hai topology dùng lambda1 và giữ khoảng cách ngắn nhất host1-host2 là 2 hop.
[Config SoSanh3_DutCap_TopoHienTai]
description = "Đứt cáp, profile lambda1, topology hiện tại: 4 switch/4 link"
extends = ExperimentBase, TopoHienTai, SuCoDutCap

[Config SoSanh3_DutCap_TopoPhucTap]
description = "Đứt cáp, profile lambda1, topology phức tạp: 8 switch/9 link"
extends = ExperimentBase, TopoPhucTap, SuCoDutCap

# So sánh 4: ảnh hưởng của độ phức tạp topology khi Root Bridge sập.
[Config SoSanh4_SapRoot_TopoHienTai]
description = "Sập root sw2, profile lambda1, topology hiện tại: 4 switch/4 link"
extends = ExperimentBase, TopoHienTai, SuCoSapRoot

[Config SoSanh4_SapRoot_TopoPhucTap]
description = "Sập root sw2, profile lambda1, topology phức tạp: 8 switch/9 link"
extends = ExperimentBase, TopoPhucTap, SuCoSapRoot
